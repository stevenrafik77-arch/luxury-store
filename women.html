<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المجموعة النسائية | Luxury Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <div class="logo">
                <a href="index.html">Luxury<span>Store</span></a>
            </div>

            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="men.html">رجالي</a></li>
                    <li><a href="women.html" style="color: var(--gold);">نسائي</a></li>
                    <li><a href="about.html">من نحن</a></li>
                </ul>
            </nav>

            <div class="search-box">
                <input type="text" id="main-search" placeholder="ابحث عن الفخامة...">
                <div id="search-results-container" class="search-results"></div>
            </div>

            <a href="cart.html" class="cart-icon">
                <span id="cart-count">0</span>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </a>
        </div>
    </header>

    <section class="hero" style="height: 40vh; background-image: linear-gradient(rgba(0, 42, 23, 0.7), rgba(0, 42, 23, 0.7)), url('https://images.unsplash.com/photo-1485230895905-ec40ba36b9bc?q=80&w=2070');">
        <div class="container">
            <div class="hero-content reveal">
                <h1>المجموعة النسائية</h1>
                <p>أناقة ملكية لا تضاهى</p>
            </div>
        </div>
    </section>

    <section class="products">
        <div class="container">
            <a href="index.html#categories" class="btn-back reveal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <span>العودة للأقسام</span>
            </a>

            <div class="price-filter">
                <button class="filter-btn active" data-range="all">الكل</button>
                <button class="filter-btn" data-range="0-2000">أقل من 2000 ر.س</button>
                <button class="filter-btn" data-range="2000-5000">2000 - 5000 ر.س</button>
                <button class="filter-btn" data-range="5000-up">أكثر من 5000 ر.س</button>
            </div>

            <div class="product-grid">
            <div class="product-card reveal" data-id="201">
                <img src="https://images.unsplash.com/photo-1566174053879-31528523f8ae?q=80&w=1908" alt="قفطان ملكي" class="product-image">
                <h3>قفطان ملكي مرصع</h3>
                <p class="price">5,800 ر.س</p>
                <button class="add-to-cart">إضافة للسلة</button>
            </div>
            <div class="product-card reveal" data-id="202">
                <img src="https://plus.unsplash.com/premium_photo-1681276170291-27698ccc0a8e?q=80&w=387&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="طقم زمرد" class="product-image">
                <h3>طقم مجوهرات الزمرد</h3>
                <p class="price">15,000 ر.س</p>
                <button class="add-to-cart">إضافة للسلة</button>
            </div>
            <div class="product-card reveal" data-id="203">
                <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?q=80&w=1935" alt="حقيبة فاخرة" class="product-image">
                <h3>حقيبة كروكو بلمسات ذهبية</h3>
                <p class="price">4,100 ر.س</p>
                <button class="add-to-cart">إضافة للسلة</button>
            </div>
            <div class="product-card reveal" data-id="204">
                <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?q=80&w=2008" alt="عطر فاخر" class="product-image">
                <h3>عطر روح الورد الفاخر</h3>
                <p class="price">1,200 ر.س</p>
                <button class="add-to-cart">إضافة للسلة</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
