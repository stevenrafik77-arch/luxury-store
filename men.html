<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المجموعة الرجالية | Luxury Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <div class="logo">
                <a href="index.html">Luxury<span>Store</span></a>
            </div>

            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="men.html" style="color: var(--gold);">رجالي</a></li>
                    <li><a href="women.html">نسائي</a></li>
                    <li><a href="about.html">من نحن</a></li>
                </ul>
            </nav>

            <div class="search-box">
                <input type="text" id="main-search" placeholder="ابحث عن الفخامة...">
                <div id="search-results-container" class="search-results"></div>
            </div>

            <a href="cart.html" class="cart-icon">
                <span id="cart-count">0</span>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </a>
        </div>
    </header>

    <section class="hero" style="height: 40vh; background-image: linear-gradient(rgba(0, 42, 23, 0.7), rgba(0, 42, 23, 0.7)), url('https://images.unsplash.com/photo-1497339100210-9e87df79c218?q=80&w=2070');">
        <div class="container">
            <div class="hero-content reveal">
                <h1>المجموعة الرجالية</h1>
                <p>فخامة التفاصيل لكل مناسبة</p>
            </div>
        </div>
    </section>

    <section class="products">
        <div class="container">
            <a href="index.html#categories" class="btn-back reveal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <span>العودة للأقسام</span>
            </a>
            
            <div class="price-filter">
                <button class="filter-btn active" data-range="all">الكل</button>
                <button class="filter-btn" data-range="0-2000">أقل من 2000 ر.س</button>
                <button class="filter-btn" data-range="2000-5000">2000 - 5000 ر.س</button>
                <button class="filter-btn" data-range="5000-up">أكثر من 5000 ر.س</button>
            </div>

            <div class="product-grid">
            <div class="product-card reveal" data-id="101">
                <img src="https://plus.unsplash.com/premium_photo-1661308219954-a8035fbeb546?q=80&w=387&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="بدلة فاخرة" class="product-image">
                <h3>بدلة إيطالية فاخرة</h3>
                <p class="price">4,500 ر.س</p>
                <button class="add-to-cart">إضافة للسلة</button>
            </div>
            <div class="product-card reveal" data-id="102">
                <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?q=80&w=1974" alt="ساعة ملكية" class="product-image">
                <h3>ساعة كرونوغراف ملكية</h3>
                <p class="price">6,500 ر.س</p>
                <button class="add-to-cart">إضافة للسلة</button>
            </div>
            <div class="product-card reveal" data-id="103">
                <img src="https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?q=80&w=1974" alt="أزرار فاخرة" class="product-image">
                <h3>طقم أزرار من العقيق</h3>
                <p class="price">1,200 ر.س</p>
                <button class="add-to-cart">إضافة للسلة</button>
            </div>
            <div class="product-card reveal" data-id="104">
                <img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=1974" alt="عطر العود" class="product-image">
                <h3>عطر العود الكمبودي</h3>
                <p class="price">2,100 ر.س</p>
                <button class="add-to-cart">إضافة للسلة</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
